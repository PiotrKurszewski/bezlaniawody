<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bez Lania Wody - Sklep</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        
        /* Dla telefonów: zajmuje pełne 100% od brzegu do brzegu */
        .sklep-container {
            width: 100%;
            max-width: 100%; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        
        .sklep-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Dla komputerów (ekrany powyżej 768px): poszerzamy do 1000px, żeby nie było za wąsko */
        @media (min-width: 768px) {
            .sklep-container {
                max-width: 1000px; /* Większa, optymalna szerokość na PC */
            }
        }
    </style>
</head>
<body>

    <div class="sklep-container">
        <img src="strona1.png" alt="Sekcja 1 sklepu">
        <img src="strona2.png" alt="Sekcja 2 sklepu">
        <img src="strona3.png" alt="Sekcja 3 sklepu">
    </div>

</body>
</html>
