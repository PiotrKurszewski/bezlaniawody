<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bez Lania Wody - Sklep</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        .sklep-container {
            width: 100%;
            max-width: 1000px; /* Szerokość na PC */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .sklep-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* NA TELEFONIE: Pokazujemy mobilną wersję, ukrywamy wersję na PC */
        .pokaz-pc { display: none !important; }
        .pokaz-mobile { display: block !important; }

        /* NA KOMPUTERZE (ekrany powyżej 768px): Pokazujemy wersję PC, ukrywamy mobilną */
        @media screen and (min-width: 768px) {
            .pokaz-pc { display: block !important; }
            .pokaz-mobile { display: none !important; }
        }
        
        area { outline: none; }
    </style>
</head>
<body>

    <div class="sklep-container">
        
        <!-- WERSJA MOBILNA (Z wielkimi napisami - z mapą linków dla telefonu) -->
        <img src="strona1-mobile.png?v=4" alt="Nagłówek Mobile" class="pokaz-mobile" usemap="#mapa-mobile">
        <map name="mapa-mobile">
            <!-- Wklej współrzędne przycisku na telefonie (wygenerowane z image-map.net) -->
            <area shape="rect" coords="50,10,250,90" alt="Kup teraz" href="LINK_DO_PLATNOSCI_STRIPE_LUB_NAFFY">
        </map>
        
        <!-- WERSJA PC (Z normalnymi napisami - z osobno dopasowaną mapą linków dla PC) -->
        <img src="strona1-pc.png?v=4" alt="Nagłówek PC" class="pokaz-pc" usemap="#mapa-pc">
        <map name="mapa-pc">
            <!-- Wklej współrzędne przycisku na PC (wygenerowane z image-map.net) -->
            <area shape="rect" coords="100,20,400,120" alt="Kup teraz" href="LINK_DO_PLATNOSCI_STRIPE_LUB_NAFFY">
        </map>

        <!-- Dalsze sekcje wspólne dla obu urządzeń -->
        <img src="strona2.png?v=4" alt="Sekcja 2">
        <img src="strona3.png?v=4" alt="Sekcja 3">
    </div>

</body>
</html>
