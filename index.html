<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bez Lania Wody - Sklep</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; /* Delikatne tło wokół strony na PC */
            font-family: sans-serif;
        }
        .sklep-container {
            width: 100%;
            max-width: 600px; /* Idealna szerokość smartfona na ekranie PC */
            margin: 0 auto;   /* Wyśrodkowuje całą stronę na komputerze */
            display: flex;
            flex-direction: column;
            background-color: #ffffff; /* Białe tło samej strony */
            box-shadow: 0 0 20px rgba(0,0,0,0.05); /* Estetyczny cień na PC */
        }
        .sklep-container img {
            width: 100%;
            height: auto;
            display: block; /* Całkowicie usuwa przerwy i szpary między obrazkami */
        }
    </style>
</head>
<body>

    <div class="sklep-container">
        <img src="strona1.png" alt="Sekcja 1 sklepu">
        <img src="strona2.png" alt="Sekcja 2 sklepu">
        <img src="strona3.png" alt="Sekcja 3 sklepu">
    </div>

</body>
</html>
